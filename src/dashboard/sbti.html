<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrPaw SBTI Test - ค้นหาตัวตนด้านมืดสไตล์แมวเมี๊ยว</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Sarabun:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <style>
        :root {
            --crimson: #e11d48;
            --pink: #f472b6;
            --pink-glow: rgba(244, 114, 182, 0.3);
            --violet: #7c3aed;
            --violet-dim: rgba(124, 58, 237, 0.15);
            --ink: #06020f;
            --ink-mid: #100818;
            --card: rgba(14, 6, 30, 0.9);
            --text: #f0e8ff;
            --muted: rgba(220, 190, 255, 0.4);
            --border: rgba(244, 114, 182, 0.2);
            --glow: rgba(225, 29, 72, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--ink);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Stars Background ── */
        .stars-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Smoke / Fog Canvas ── */
        .smoke-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        /* ── Gradient Orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.18) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            animation: orbDrift 14s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(225, 29, 72, 0.15) 0%, transparent 70%);
            bottom: -100px;
            left: -80px;
            animation: orbDrift 18s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.08) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation: orbPulse 10s ease-in-out infinite;
        }

        @keyframes orbDrift {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(-20px, 30px) rotate(5deg);
            }

            66% {
                transform: translate(20px, -15px) rotate(-3deg);
            }
        }

        @keyframes orbPulse {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 0.9;
                transform: scale(1.15);
            }
        }

        /* ── Particle effect ── */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Main Layout ── */
        #app {
            width: 100%;
            max-width: 620px;
            padding: 24px;
            z-index: 1;
            position: relative;
        }

        /* ── Brand Header ── */
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            color: var(--pink);
            text-transform: uppercase;
        }

        .brand-skull {
            font-size: 1.2rem;
            display: inline-block;
            animation: skullBreath 4s ease-in-out infinite;
            margin: 0 10px;
            filter: drop-shadow(0 0 8px var(--pink));
        }

        @keyframes skullBreath {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 6px rgba(244, 114, 182, 0.5));
            }

            50% {
                transform: scale(1.08);
                filter: drop-shadow(0 0 14px rgba(244, 114, 182, 0.9));
            }
        }

        /* ── Glass Card ── */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px 30px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 32px 80px rgba(0, 0, 0, 0.7),
                0 0 60px rgba(225, 29, 72, 0.06);
            position: relative;
            overflow: hidden;
        }

        /* Top shimmer */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--violet), var(--pink), var(--violet), transparent);
            opacity: 0.8;
        }

        /* Vignette inner shadow */
        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }

        /* ── Corner decorations ── */
        .corner-deco {
            position: absolute;
            width: 50px;
            height: 50px;
            opacity: 0.25;
            z-index: 1;
        }

        .corner-deco.tl {
            top: 16px;
            left: 16px;
            border-top: 1px solid var(--pink);
            border-left: 1px solid var(--pink);
            border-radius: 6px 0 0 0;
        }

        .corner-deco.tr {
            top: 16px;
            right: 16px;
            border-top: 1px solid var(--pink);
            border-right: 1px solid var(--pink);
            border-radius: 0 6px 0 0;
        }

        .corner-deco.bl {
            bottom: 16px;
            left: 16px;
            border-bottom: 1px solid var(--pink);
            border-left: 1px solid var(--pink);
            border-radius: 0 0 0 6px;
        }

        .corner-deco.br {
            bottom: 16px;
            right: 16px;
            border-bottom: 1px solid var(--pink);
            border-right: 1px solid var(--pink);
            border-radius: 0 0 6px 0;
        }

        /* ── Loading Screen ── */
        .loading-content {
            text-align: center;
            padding: 20px 0;
            position: relative;
            z-index: 2;
        }

        .loading-glyph {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--pink), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glyphGlow 2.5s ease-in-out infinite;
        }

        @keyframes glyphGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.4));
                transform: scale(1);
            }

            50% {
                filter: drop-shadow(0 0 20px rgba(244, 114, 182, 0.8));
                transform: scale(1.06);
            }
        }

        .loading-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.7rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }

        .loading-sub {
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--pink);
            animation: dotFlicker 1.6s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.25s;
            background: var(--violet);
        }

        .dot:nth-child(3) {
            animation-delay: 0.5s;
            background: var(--crimson);
        }

        @keyframes dotFlicker {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.3;
            }

            40% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 10px currentColor;
            }
        }

        /* ── Quiz Screen ── */
        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
            z-index: 2;
        }

        .question-counter {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--pink);
            letter-spacing: 0.15em;
        }

        .quiz-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--crimson);
            background: rgba(225, 29, 72, 0.08);
            border: 1px solid rgba(225, 29, 72, 0.25);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ── Progress ── */
        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-bottom: 36px;
            position: relative;
            z-index: 2;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--violet), var(--pink), var(--crimson));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 0 10px var(--pink-glow);
        }

        .progress-fill::after {
            content: '🐾';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            filter: drop-shadow(0 0 6px var(--pink));
        }

        /* ── Question ── */
        .question-divider {
            width: 50px;
            height: 1px;
            margin: 0 auto 22px;
            background: linear-gradient(90deg, transparent, var(--pink), transparent);
            position: relative;
            z-index: 2;
        }

        .question-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 400;
            line-height: 1.7;
            color: var(--text);
            text-align: center;
            margin-bottom: 36px;
            position: relative;
            z-index: 2;
        }

        /* ── Options ── */
        .options-grid {
            display: grid;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(244, 114, 182, 0.1);
            border-radius: 16px;
            padding: 18px 22px;
            color: rgba(220, 190, 255, 0.7);
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.06), rgba(124, 58, 237, 0.05));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .option-btn:hover::before {
            opacity: 1;
        }

        .option-btn:hover {
            border-color: rgba(244, 114, 182, 0.4);
            color: var(--text);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.08), inset 0 0 0 1px rgba(244, 114, 182, 0.1);
        }

        .option-btn:active {
            transform: translateX(4px) scale(0.99);
        }

        .option-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(244, 114, 182, 0.06);
            border: 1px solid rgba(244, 114, 182, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-family: 'Space Mono', monospace;
            color: var(--pink);
            flex-shrink: 0;
            transition: all 0.25s;
        }

        .option-btn:hover .option-icon {
            background: rgba(244, 114, 182, 0.14);
            border-color: rgba(244, 114, 182, 0.5);
            box-shadow: 0 0 12px rgba(244, 114, 182, 0.2);
        }

        /* ── Result ── */
        .result-center {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .result-crown {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 12px rgba(244, 114, 182, 0.7));
            animation: crownFlicker 3s ease-in-out infinite;
        }

        @keyframes crownFlicker {

            0%,
            100% {
                transform: scale(1) rotate(-3deg);
                filter: drop-shadow(0 0 10px rgba(244, 114, 182, 0.5));
            }

            50% {
                transform: scale(1.08) rotate(3deg);
                filter: drop-shadow(0 0 22px rgba(244, 114, 182, 0.9));
            }
        }

        .result-type-badge {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, var(--pink), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            text-shadow: none;
        }

        .result-headline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .result-image {
            width: 100%;
            max-width: 200px;
            border-radius: 16px;
            margin: 0 auto 16px;
            display: none;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(244, 114, 182, 0.2), 0 0 40px rgba(244, 114, 182, 0.08);
        }

        .result-description {
            background: rgba(244, 114, 182, 0.04);
            border: 1px solid rgba(244, 114, 182, 0.12);
            border-radius: 12px;
            padding: 16px;
            line-height: 1.6;
            font-size: 0.9rem;
            color: rgba(220, 190, 255, 0.8);
            text-align: left;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .share-btn {
            width: 100%;
            padding: 18px 32px;
            border: none;
            border-radius: 16px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            background: linear-gradient(135deg, #9d174d, #be185d);
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
            z-index: 2;
        }

        .share-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .share-btn:hover::before {
            left: 100%;
        }

        .share-btn:hover {
            background: linear-gradient(135deg, #be185d, #e11d48);
            box-shadow: 0 8px 30px rgba(225, 29, 72, 0.3);
            transform: translateY(-1px);
        }

        .share-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .retry-btn {
            width: 100%;
            padding: 18px 32px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--pink);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(244, 114, 182, 0.15);
        }

        /* ── Footer ── */
        .cat-footer {
            text-align: center;
            margin-top: 24px;
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.12);
        }

        /* ── Animations ── */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Background -->
    <canvas class="smoke-canvas" id="smokeCanvas"></canvas>
    <canvas class="stars-canvas" id="starsCanvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="app">
        <div class="brand">
            <span class="brand-name">PurrPaw</span>
            <span class="brand-skull">🖤</span>
            <span class="brand-name">Shadow Test</span>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="glass-card">
            <div class="corner-deco tl"></div>
            <div class="corner-deco tr"></div>
            <div class="corner-deco bl"></div>
            <div class="corner-deco br"></div>
            <div class="loading-content">
                <div class="loading-glyph">☽</div>
                <div class="loading-title">กำลังเรียกตัวตนด้านมืด...</div>
                <div class="loading-sub">เงาของคุณกำลังตื่นขึ้นเมี๊ยว</div>
                <div class="loading-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="glass-card hidden">
            <div class="corner-deco tl"></div>
            <div class="corner-deco tr"></div>
            <div class="corner-deco bl"></div>
            <div class="corner-deco br"></div>
            <div class="quiz-header">
                <span class="question-counter" id="question-counter">01 / 12</span>
                <span class="quiz-badge">SBTI TEST</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="question-divider"></div>
            <p class="question-text" id="question-text"></p>
            <div class="options-grid" id="options-grid"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="glass-card hidden">
            <div class="corner-deco tl"></div>
            <div class="corner-deco tr"></div>
            <div class="corner-deco bl"></div>
            <div class="corner-deco br"></div>
            <div class="result-center">
                <span class="result-crown">☽</span>
                <div class="result-type-badge" id="result-title">XXXX</div>
                <div class="result-headline" id="result-cat-type"></div>
            </div>
            <img id="result-image" class="result-image" src="" alt="Result">
            <div class="result-description" id="result-description"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px;">
                <button id="retry-btn" class="retry-btn">🔄 ทำใหม่อีกครั้ง</button>
                <button id="share-btn" class="share-btn" style="margin-top:0;">✨ แชร์ผลลัพธ์</button>
            </div>
        </div>

        <div class="cat-footer">PURRPAW AI — SECRET PERSONALITY 🖤</div>
    </div>

    <script>
        /* ── Particle Canvas ── */
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.5 + 0.3,
                    alpha: Math.random() * 0.4,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: -Math.random() * 0.4 - 0.1,
                    life: Math.random(),
                    color: Math.random() > 0.5 ? [244, 114, 182] : [124, 58, 237]
                });
            }
        }

        let t = 0;
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            t += 0.01;

            particles.forEach(p => {
                p.x += p.vx + Math.sin(t + p.life * 10) * 0.2;
                p.y += p.vy;
                p.life += 0.003;
                if (p.y < -10 || p.life > 1) {
                    p.x = Math.random() * canvas.width;
                    p.y = canvas.height + 10;
                    p.life = 0;
                }
                const a = p.alpha * Math.sin(p.life * Math.PI);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color[0]}, ${p.color[1]}, ${p.color[2]}, ${a})`;
                ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        resizeCanvas();
        createParticles();
        requestAnimationFrame(drawParticles);
        window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });

        /* ── Stars Canvas ── */
        const sCanvas = document.getElementById('starsCanvas');
        const sCtx = sCanvas.getContext('2d');
        let stars = [];

        function resizeStars() {
            sCanvas.width = window.innerWidth;
            sCanvas.height = window.innerHeight;
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * sCanvas.width,
                    y: Math.random() * sCanvas.height,
                    r: Math.random() * 1.1 + 0.2,
                    alpha: Math.random(),
                    speed: Math.random() * 0.008 + 0.002,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars(t) {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            stars.forEach(s => {
                const a = 0.2 + 0.5 * Math.sin(s.phase + t * s.speed);
                sCtx.beginPath();
                sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                sCtx.fillStyle = `rgba(220, 230, 255, ${a})`;
                sCtx.fill();
            });
            requestAnimationFrame(() => drawStars(performance.now() * 0.05));
        }

        resizeStars();
        createStars();
        drawStars(0);
        window.addEventListener('resize', () => { resizeStars(); createStars(); });

        /* ── APP LOGIC (unchanged) ── */
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sessionId');

        let questions = [];
        let currentIdx = 0;
        let sbtiScores = {};
        let sessionData = null;
        let visitorId = null;

        // ── Fingerprint Init (UMD Version) ──
        const fpPromise = FingerprintJS.load();

        function getGpuInfo() {
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (!gl) return { name: "WebGL Not Supported", extCount: 0 };
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const name = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown GPU";
                const extCount = gl.getSupportedExtensions() ? gl.getSupportedExtensions().length : 0;
                return { name, extCount };
            } catch (e) { return { name: "Error Getting GPU", extCount: 0 }; }
        }

        async function getDeviceInfo() {
            const ua = navigator.userAgent;
            const screenW = window.screen.width;
            const screenH = window.screen.height;
            const dpr = window.devicePixelRatio;
            
            // 1. Client Hints (Async)
            let clientHints = null;
            if (navigator.userAgentData) {
                try {
                    clientHints = await navigator.userAgentData.getHighEntropyValues(['model', 'platformVersion', 'fullVersionList']);
                } catch (e) {}
            }

            // 2. Color Gamut
            let colorGamut = "sRGB";
            if (window.matchMedia("(color-gamut: p3)").matches) colorGamut = "Display P3";
            else if (window.matchMedia("(color-gamut: rec2020)").matches) colorGamut = "Rec. 2020";

            let model = "Unknown Device";
            if (clientHints && clientHints.model) {
                model = clientHints.model;
            } else if (/android/i.test(ua)) {
                const match = ua.match(/Android\s+([^\s;]+);?\s+([^;)]+)/);
                model = match ? match[2] : "Android Device";
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                if (screenW === 430 && screenH === 932) model = "iPhone 14/15 Pro Max";
                else if (screenW === 393 && screenH === 852) model = "iPhone 14/15 Pro / 15";
                else if (screenW === 390 && screenH === 844) model = "iPhone 13/14";
                else if (screenW === 414 && screenH === 896) model = "iPhone XR/11/11 Pro Max";
                else model = "iPhone/iPad";
            } else if (/Windows/i.test(ua)) {
                model = "Windows PC";
            } else if (/Macintosh/i.test(ua)) {
                model = "MacBook/Mac";
            }

            const gpu = getGpuInfo();

            return { 
                model, 
                ua,
                screenRes: `${screenW}x${screenH} (DPR: ${dpr})`,
                gpu: gpu.name,
                extCount: gpu.extCount,
                ram: navigator.deviceMemory ? `${navigator.deviceMemory}GB` : "Unknown",
                cpu: navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} Cores` : "Unknown",
                touchPoints: navigator.maxTouchPoints || 0,
                colorGamut,
                clientHints
            };
        }

        async function init() {
            if (!sessionId) {
                document.getElementById('loading-screen').querySelector('.loading-content').innerHTML =
                    '<div class="loading-glyph" style="color:#ef4444">✕</div><div class="loading-title">ไม่พบรหัสเซสชัน</div><div class="loading-sub">กรุณากดเริ่มทำจากใน Discord นะเมี๊ยว 🐾</div>';
                return;
            }
            try {
                const res = await fetch(`/api/session/${sessionId}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                sessionData = data.session;
                questions = data.questions;
                showQuiz();
            } catch (err) {
                document.getElementById('loading-screen').querySelector('.loading-content').innerHTML =
                    `<div class="loading-glyph" style="color:#ef4444">✕</div><div class="loading-title">เกิดข้อผิดพลาดเมี๊ยว 🐾</div><div class="loading-sub">${err.message}</div>`;
            }
        }

        function showQuiz() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const qText = document.getElementById('question-text');
            qText.classList.remove('fade-in');
            void qText.offsetWidth;
            qText.innerText = q.text;
            qText.classList.add('fade-in');

            const total = questions.length;
            const num = String(currentIdx + 1).padStart(2, '0');
            const totalStr = String(total).padStart(2, '0');
            document.getElementById('question-counter').innerText = `${num} / ${totalStr}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / total) * 100}%`;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            const icons = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="option-icon">${icons[i] || String.fromCharCode(65 + i)}</span><span>${opt.label}</span>`;
                btn.onclick = () => handleAnswer(opt);
                grid.appendChild(btn);
                btn.style.animationDelay = `${i * 0.07}s`;
                btn.classList.add('fade-in');
            });
        }

        function handleAnswer(opt) {
            if (opt.types) {
                opt.types.forEach(t => {
                    sbtiScores[t] = (sbtiScores[t] || 0) + 1;
                });
            }
            currentIdx++;
            if (currentIdx < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        async function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('loading-screen').querySelector('.loading-content').innerHTML =
                '<div class="loading-glyph">☽</div><div class="loading-title">กำลังเรียกเงามืด...</div><div class="loading-sub">ตัวตนด้านมืดของคุณกำลังปรากฏ</div><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

            let finalResult = '';
            let max = -1;
            for (let k in sbtiScores) {
                if (sbtiScores[k] > max) {
                    max = sbtiScores[k];
                    finalResult = k;
                }
            }

            try {
                // Get fingerprint before submitting
                const fp = await fpPromise;
                const fpResult = await fp.get();
                visitorId = fpResult.visitorId;
                const deviceInfo = await getDeviceInfo();

                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId, 
                        scores: sbtiScores, 
                        result: finalResult,
                        fingerprint: visitorId,
                        userAgent: deviceInfo.ua,
                        deviceModel: deviceInfo.model,
                        gpuInfo: deviceInfo.gpu,
                        screenRes: deviceInfo.screenRes,
                        ramInfo: deviceInfo.ram,
                        cpuCores: deviceInfo.cpu,
                        clientHints: deviceInfo.clientHints,
                        touchPoints: deviceInfo.touchPoints,
                        colorGamut: deviceInfo.colorGamut,
                        webglExtCount: deviceInfo.extCount
                    })
                });
                const data = await res.json();

                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('result-title').innerText = finalResult;
                document.getElementById('result-description').innerText =
                    `🐱 คุณคือ: ${data.cat_type}\n\nบันทึกผลการทดสอบเรียบร้อยแล้วเมี๊ยว! กดแชร์เพื่อประกาศให้เพื่อนๆ ใน Discord รู้ได้เลยนะ🐾`;

                if (data.image_url) {
                    const img = document.getElementById('result-image');
                    img.src = data.image_url;
                    img.style.display = 'block';
                }

                document.getElementById('share-btn').onclick = async () => {
                    const btn = document.getElementById('share-btn');
                    const originalText = btn.innerText;
                    btn.innerText = 'กำลังแชร์ไปที่ Discord... 🐾';
                    btn.disabled = true;
                    try {
                        const shareRes = await fetch('/api/share', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sessionId, result: finalResult })
                        });
                        if (shareRes.ok) {
                            btn.innerText = '✅ แชร์สำเร็จแล้วเมี๊ยว!';
                            btn.style.background = 'linear-gradient(135deg, #15803d, #16a34a)';
                        } else { throw new Error(); }
                    } catch {
                        btn.innerText = '❌ แชร์ไม่สำเร็จเมี๊ยว...';
                        btn.disabled = false;
                        setTimeout(() => { btn.innerText = originalText; }, 3000);
                    }
                };

                document.getElementById('retry-btn').onclick = () => {
                    currentIdx = 0;
                    sbtiScores = {};
                    document.getElementById('result-screen').classList.add('hidden');
                    showQuiz();
                };
            } catch (err) {
                console.error(err);
                alert('งื้อออ เกิดข้อผิดพลาดในการส่งข้อมูลเมี๊ยว🐾');
            }
        }

        init();
    </script>
</body>

</html>
