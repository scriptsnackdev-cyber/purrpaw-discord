<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrPaw Music Dashboard 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Prompt:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --p: #7C3AED; --p-hover: #6D28D9; --bg: #0F172A; --card: rgba(30, 41, 59, 0.7); --text: #F8FAFC; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Prompt', sans-serif; }
        body { background: var(--bg); background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .main-container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 24px; }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
        .glass-card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; padding: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .player-content { text-align: center; }
        .thumbnail-container { width: 100%; max-width: 320px; aspect-ratio: 1; margin: 0 auto 24px; position: relative; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); background: #1e293b; transition: transform 0.3s; }
        .info h1 { font-size: 1.4rem; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { color: #94A3B8; margin-bottom: 20px; }
        .progress-box { margin-bottom: 24px; }
        .bar-bg { width: 100%; height: 10px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; cursor: pointer; position: relative; margin-bottom: 10px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--p), #A78BFA); width: 0%; border-radius: 10px; transition: width 0.5s linear; }
        .time-labels { display: flex; justify-content: space-between; font-size: 0.85rem; color: #94A3B8; }
        .control-group { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 24px; }
        .btn-icon { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; }
        .btn-main { width: 65px; height: 65px; background: var(--p); border: none; box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3); font-size: 1.4rem; }
        .vol-box { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 20px; max-width: 250px; margin: 0 auto; }
        .vol-slider { flex: 1; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .search-area input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px 20px; border-radius: 16px; outline: none; }
        .queue-list { flex: 1; overflow-y: auto; max-height: 450px; }
        .q-item { display: flex; gap: 12px; padding: 10px; border-radius: 16px; background: rgba(255,255,255,0.03); margin-bottom: 10px; }
        .q-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        #loading { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div id="loading"><p>กำลังเชื่อมต่อกับเจ้าเหมียว... 🐾</p></div>
    <div class="main-container">
        <div class="glass-card player-content">
            <div class="thumbnail-container">
                <img id="thumb" src="" class="thumb-img" onerror="this.src='https://i.imgur.com/8Q8pP8X.png'">
            </div>
            <div class="info"><h1 id="title">พร้อมบรรเลง...</h1><p id="uploader">PurrPaw Music</p></div>
            <div class="progress-box">
                <div class="bar-bg" id="progress-bar" onclick="seek(event)"><div id="fill" class="bar-fill"></div></div>
                <div class="time-labels"><span id="cur">0:00</span><span id="tot">0:00</span></div>
            </div>
            <div class="control-group">
                <button class="btn-icon" onclick="cmd('previous')" title="เพลงก่อนหน้า">⏮️</button>
                <button class="btn-icon btn-main" id="play-btn" onclick="cmd('toggle')" title="เล่น/หยุด">⏸️</button>
                <button class="btn-icon" onclick="cmd('skip')" title="ข้ามเพลง">⏭️</button>
                <button class="btn-icon" id="auto-btn" onclick="cmd('autoplay')" title="เล่นเพลงอัตโนมัติ">📻</button>
            </div>
            <div class="vol-box">🔊 <input type="range" class="vol-slider" min="0" max="100" oninput="cmd('volume', this.value)"></div>
        </div>
        <div class="sidebar">
            <div class="glass-card search-area">
                <input type="text" placeholder="🔍 ค้นหาเพลงหรือวางลิงก์..." onkeypress="if(event.key==='Enter'){cmd('play', this.value); this.value=''}">
            </div>
            <div class="glass-card" style="flex:1"><div style="margin-bottom:15px; font-weight:600;">📋 คิวเพลงต่อไป</div><div id="queue-list" class="queue-list"></div></div>
        </div>
    </div>
    <script>
        const socket = io();
        const gid = new URLSearchParams(window.location.search).get('guildId');
        let currentDuration = 0;

        socket.on('connect', () => { socket.emit('join_guild', gid); socket.emit('music_command', { guildId: gid, action: 'request_update' }); });
        socket.on('music_status', (data) => {
            document.getElementById('loading').style.display = 'none';
            if(!data.current) return resetUI();
            currentDuration = data.current.duration;
            document.getElementById('title').innerText = data.current.name;
            document.getElementById('uploader').innerText = `📺 ${data.current.uploader}`;
            document.getElementById('thumb').src = data.current.thumbnail;
            document.getElementById('cur').innerText = fmt(data.currentTime);
            document.getElementById('tot').innerText = fmt(data.current.duration);
            document.getElementById('fill').style.width = (data.currentTime/data.current.duration*100)+'%';
            document.getElementById('play-btn').innerText = data.paused ? '▶️' : '⏸️';
            
            // อัปเดตสถานะปุ่ม Auto เมี๊ยว🐾
            const autoBtn = document.getElementById('auto-btn');
            if (data.autoplay) {
                autoBtn.style.background = 'var(--p)';
                autoBtn.style.borderColor = 'var(--p)';
            } else {
                autoBtn.style.background = 'rgba(255,255,255,0.05)';
                autoBtn.style.borderColor = 'rgba(255,255,255,0.1)';
            }
            document.getElementById('queue-list').innerHTML = data.queue.slice(1).map(s => `
                <div class="q-item">
                    <img src="${s.thumbnail}" class="q-img" onerror="this.src='https://i.imgur.com/8Q8pP8X.png'">
                    <div style="flex:1; min-width:0;">
                        <h4 style="font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.name}</h4>
                        <p style="font-size:0.7rem; color:#94A3B8;">${s.member}</p>
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; color:#94A3B8;">ไม่มีเพลงในคิวเมี๊ยว🐾</p>';
        });

        function cmd(action, value=null) { socket.emit('music_command', { guildId: gid, action, value }); }
        function fmt(s) { if(!s || s<=0) return '0:00'; const m=Math.floor(s/60), ss=Math.floor(s%60); return `${m}:${ss<10?'0':''}${ss}`; }
        function resetUI() { document.getElementById('title').innerText = 'พร้อมบรรเลง...'; document.getElementById('fill').style.width = '0%'; }
        
        function seek(e) {
            const bar = document.getElementById('progress-bar');
            const rect = bar.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const width = rect.width;
            const percent = x / width;
            if (currentDuration > 0) {
                const targetTime = Math.floor(percent * currentDuration);
                cmd('seek', targetTime);
            }
        }

        // Polling removed as bot pushes updates automaticallyเมี๊ยว🐾
    </script>
</body>
</html>
