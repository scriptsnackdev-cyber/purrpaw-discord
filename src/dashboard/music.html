<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrPaw Music - Control Panel 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #7C3AED;
            --primary-light: #A78BFA;
            --bg-dark: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #F8FAFC;
            --text-dim: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Prompt', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🌌 Background Glow */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        .main-container {
            width: 95%;
            max-width: 900px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }

        @media (max-width: 850px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* 💎 Player Card */
        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .song-thumbnail-wrapper {
            width: 280px;
            height: 280px;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .song-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        .song-thumbnail:hover {
            transform: scale(1.02);
        }

        .song-info h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .song-info p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        /* 🎚️ Progress Bar */
        .progress-container {
            width: 100%;
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            width: 0%;
            border-radius: 10px;
            transition: width 1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* 🎮 Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        .btn:hover {
            transform: translateY(-2px);
            color: var(--primary-light);
        }

        .btn-play {
            width: 64px;
            height: 64px;
            background: var(--primary);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .btn-play:hover {
            background: var(--primary-light);
            box-shadow: 0 15px 30px rgba(124, 58, 237, 0.5);
            color: white;
        }

        .btn-play svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .btn-secondary svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* 🔊 Volume */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 200px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
        }

        /* 📋 Queue Section */
        .queue-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            max-height: 700px;
        }

        .queue-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .queue-list::-webkit-scrollbar {
            width: 4px;
        }

        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            transition: background 0.2s ease;
            cursor: default;
            margin-bottom: 8px;
        }

        .queue-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .q-thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        .q-info {
            flex: 1;
            min-width: 0;
        }

        .q-info h4 {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .q-info p {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* 🔍 Search Input */
        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            flex: 1;
            outline: none;
            font-size: 0.9rem;
        }

        /* 🌸 Loading Overlay */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(124, 58, 237, 0.2);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div id="loading-overlay">
        <div class="loader"></div>
        <p>กำลังเชื่อมต่อกับเจ้าเหมียวนักดนตรี... 🐾</p>
    </div>

    <div class="main-container">
        <!-- 🎵 Left: Player -->
        <div class="player-card">
            <div class="song-thumbnail-wrapper">
                <img id="current-thumb" src="https://media.tenor.com/On7tS9rnSBYAAAAj/loading-waiting.gif" alt="Thumbnail" class="song-thumbnail">
            </div>

            <div class="song-info">
                <h1 id="current-title">ยังไม่มีเพลงที่เล่นอยู่...</h1>
                <p id="current-uploader">PurrPaw Music🐾</p>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="time-info">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="sendCommand('previous')">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
                </button>
                <button class="btn btn-play" id="btn-play" onclick="togglePlay()">
                    <svg id="play-icon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="btn btn-secondary" onclick="sendCommand('skip')">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <div class="volume-container">
                <svg width="20" height="20" fill="var(--text-dim)" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50" oninput="setVolume(this.value)">
            </div>
        </div>

        <!-- 📋 Right: Queue & Search -->
        <div class="queue-panel">
            <div class="queue-header">
                🔍 ค้นหา & เพิ่มเพลง
            </div>
            <div class="search-box">
                <svg width="20" height="20" fill="var(--text-dim)" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="music-query" placeholder="ชื่อเพลงหรือลิงก์ YouTube..." onkeypress="handleSearch(event)">
            </div>

            <div class="queue-header">
                📋 คิวเพลงต่อไป
            </div>
            <div class="queue-list" id="queue-list">
                <p style="text-align: center; color: var(--text-dim); margin-top: 20px;">ไม่มีเพลงในคิวเมี๊ยว...</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const guildId = urlParams.get('guildId');

        if (!guildId) {
            document.body.innerHTML = "<div style='text-align:center; padding:50px;'><h1>❌ ไม่พบ Guild ID!</h1><p>กรุณาเข้าใช้งานผ่านปุ่มใน Discord นะเมี๊ยว🐾</p></div>";
        }

        socket.emit('join_guild', guildId);

        // --- 📡 SOCKET EVENTS ---
        socket.on('joined', (data) => {
            console.log('✅ Successfully joined guild room:', data.guildId);
        });

        socket.on('music_status', (data) => {
            console.log('🎵 Received music status update:', data);
            hideLoading();
            updateUI(data);
        });

        socket.on('connect', () => {
            console.log('Connected to socket server');
            socket.emit('music_command', { guildId, action: 'request_update' });
        });

        function updateUI(data) {
            const { current, queue, paused, volume, currentTime } = data;

            if (current) {
                document.getElementById('current-title').innerText = current.name;
                document.getElementById('current-uploader').innerText = `📺 ${current.uploader}`;
                document.getElementById('current-thumb').src = current.thumbnail;
                document.getElementById('time-total').innerText = fmt(current.duration);
                document.getElementById('time-current').innerText = fmt(currentTime);
                
                const percent = (currentTime / current.duration) * 100;
                document.getElementById('progress-fill').style.width = `${percent}%`;
            }

            const playIcon = document.getElementById('play-icon');
            if (paused) {
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            } else {
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }

            document.getElementById('volume-slider').value = volume;

            const listEl = document.getElementById('queue-list');
            if (queue && queue.length > 1) { // slice(1) because first is current
                listEl.innerHTML = queue.slice(1).map((s, i) => `
                    <div class="queue-item">
                        <img src="${s.thumbnail}" class="q-thumb">
                        <div class="q-info">
                            <h4>${s.name}</h4>
                            <p>${fmt(s.duration)} • โดย ${s.member}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                listEl.innerHTML = '<p style="text-align: center; color: var(--text-dim); margin-top: 20px;">ไม่มีเพลงในคิวเมี๊ยว...</p>';
            }
        }

        function sendCommand(action, value = null) {
            socket.emit('music_command', { guildId, action, value });
        }

        function togglePlay() {
            sendCommand('toggle');
        }

        function setVolume(v) {
            sendCommand('volume', parseInt(v));
        }

        function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (!query) return;
                sendCommand('play', query);
                e.target.value = '';
            }
        }

        function fmt(sec) {
            if (!sec || sec === 0) return 'LIVE';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500);
            }
        }

        // Request update periodically
        setInterval(() => {
            socket.emit('music_command', { guildId, action: 'request_update' });
        }, 3000);
    </script>
</body>
</html>
