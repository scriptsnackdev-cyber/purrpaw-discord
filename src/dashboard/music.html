<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrPaw Music 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Prompt:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --p: #7C3AED; --bg: #0F172A; --card: rgba(30, 41, 59, 0.7); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Prompt', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 95%; max-width: 900px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
        .card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 24px; text-align: center; }
        .thumb { width: 250px; height: 250px; border-radius: 16px; object-fit: cover; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .fill { height: 100%; background: var(--p); width: 0%; transition: width 1s linear; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .btn { background: var(--p); border: none; color: #fff; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .btn-play { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 12px; outline: none; margin-bottom: 15px; }
        .queue-item { display: flex; gap: 10px; padding: 10px; border-radius: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.03); text-align: left; }
        .q-img { width: 50px; height: 50px; border-radius: 8px; }
        #loading { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div id="loading"><p>กำลังเชื่อมต่อกับเจ้าเหมียว... 🐾</p></div>
    <div class="container">
        <div class="card">
            <img id="thumb" src="" class="thumb">
            <h2 id="title">ยังไม่มีเพลงเมี๊ยว...</h2>
            <p id="uploader" style="color:#94A3B8"></p>
            <div class="progress-bar"><div id="fill" class="fill"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:20px;">
                <span id="cur">0:00</span><span id="tot">0:00</span>
            </div>
            <div class="controls">
                <button class="btn" onclick="cmd('skip')">⏭️ ข้าม</button>
                <button class="btn btn-play" onclick="cmd('toggle')">⏸️</button>
            </div>
            <input type="range" min="0" max="100" oninput="cmd('volume', this.value)">
        </div>
        <div class="card" style="text-align: left;">
            <h3>🔍 เพิ่มเพลง</h3>
            <input type="text" placeholder="ชื่อเพลงหรือลิงก์..." onkeypress="if(event.key==='Enter'){cmd('play', this.value); this.value=''}">
            <h3>📋 คิวเพลง</h3>
            <div id="list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>
    <script>
        const socket = io();
        const gid = new URLSearchParams(window.location.search).get('guildId');
        if(!gid) document.body.innerHTML = "❌ No Guild ID";
        
        socket.on('connect', () => {
            socket.emit('join_guild', gid);
            socket.emit('music_command', { guildId: gid, action: 'request_update' });
        });

        socket.on('joined', () => { console.log('✅ Joined'); });
        socket.on('music_status', (data) => {
            document.getElementById('loading').style.opacity = 0;
            setTimeout(()=>document.getElementById('loading').style.display='none', 500);
            if(!data.current) return;
            document.getElementById('title').innerText = data.current.name;
            document.getElementById('uploader').innerText = data.current.uploader;
            document.getElementById('thumb').src = data.current.thumbnail;
            document.getElementById('tot').innerText = fmt(data.current.duration);
            document.getElementById('cur').innerText = fmt(data.currentTime);
            document.getElementById('fill').style.width = (data.currentTime/data.current.duration*100)+'%';
            document.getElementById('list').innerHTML = data.queue.slice(1).map(s => `
                <div class="queue-item">
                    <img src="${s.thumbnail}" class="q-img">
                    <div><div style="font-size:14px; font-weight:600;">${s.name}</div><div style="font-size:12px; color:#94A3B8">${s.member}</div></div>
                </div>
            `).join('') || '<p>ไม่มีคิวเมี๊ยว🐾</p>';
        });

        function cmd(action, value=null) { socket.emit('music_command', { guildId: gid, action, value }); }
        function fmt(s) { if(!s) return '0:00'; const m=Math.floor(s/60), ss=Math.floor(s%60); return `${m}:${ss<10?'0':''}${ss}`; }
        setInterval(()=>socket.emit('music_command', { guildId: gid, action: 'request_update' }), 3000);
    </script>
</body>
</html>
