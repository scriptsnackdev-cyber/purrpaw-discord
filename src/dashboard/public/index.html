<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrPaw MBTI - ยินดีต้อนรับเมี๊ยว🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #ec4899;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Anuphan', 'Outfit', sans-serif; }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 50px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #60a5fa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .btn-discord {
            display: inline-block;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-discord:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🐾</div>
        <h1>PurrPaw MBTI Test</h1>
        <p>ยินดีต้อนรับสู่โลกของแมวเมี๊ยว! <br>หากคุณต้องการเริ่มทำแบบทดสอบ กรุณาไปที่เซิร์ฟเวอร์ Discord ของคุณแล้วใช้คำสั่ง <b>/mbti start</b> หรือกดปุ่มเริ่มทำจากข้อความของบอทนะครับ</p>
        <a href="https://discord.com" class="btn-discord">ไปที่ Discord ของคุณ 🐾</a>
        <div class="footer">PurrPaw AI Project - Premium Test System</div>
    </div>
</body>
</html>
