<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrPaw MBTI Test - ค้นหาตัวตนสไตล์แมวเมี๊ยว</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Sarabun:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.15);
            --navy: #050d1a;
            --navy-mid: #0a1628;
            --card: rgba(8, 20, 45, 0.85);
            --text: #e8f0ff;
            --muted: rgba(200, 220, 255, 0.45);
            --border: rgba(201, 168, 76, 0.25);
            --glow: rgba(0, 212, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--navy);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Stars Background ── */
        .stars-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Gradient Orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 100, 200, 0.2) 0%, transparent 70%);
            top: -150px;
            left: -100px;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.12) 0%, transparent 70%);
            bottom: -100px;
            right: -80px;
            animation: orbFloat 15s ease-in-out infinite reverse;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbPulse 8s ease-in-out infinite;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, 40px);
            }
        }

        @keyframes orbPulse {

            0%,
            100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        /* ── Main Layout ── */
        #app {
            width: 100%;
            max-width: 620px;
            padding: 24px;
            z-index: 1;
            position: relative;
        }

        /* ── Brand Header ── */
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.35em;
            color: var(--gold);
            text-transform: uppercase;
        }

        .brand-paw {
            font-size: 1.4rem;
            display: inline-block;
            animation: pawWiggle 3s ease-in-out infinite;
            margin: 0 8px;
        }

        @keyframes pawWiggle {

            0%,
            100% {
                transform: rotate(-5deg) scale(1);
            }

            50% {
                transform: rotate(5deg) scale(1.1);
            }
        }

        /* ── Glass Card ── */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px 30px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                0 32px 64px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(0, 212, 255, 0.04);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), rgba(0, 212, 255, 0.6), var(--gold), transparent);
            opacity: 0.7;
        }

        .hidden {
            display: none !important;
        }

        /* ── Loading Screen ── */
        .loading-content {
            text-align: center;
            padding: 20px 0;
        }

        .loading-glyph {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--gold), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glyphPulse 2s ease-in-out infinite;
        }

        @keyframes glyphPulse {

            0%,
            100% {
                opacity: 0.8;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .loading-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
        }

        .loading-sub {
            color: var(--muted);
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
            background: var(--gold);
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
            background: var(--cyan);
        }

        @keyframes dotBounce {

            0%,
            80%,
            100% {
                transform: scale(0.7);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── Quiz Screen ── */
        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .question-counter {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--gold);
            letter-spacing: 0.15em;
        }

        .quiz-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--cyan);
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* ── Progress ── */
        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            margin-bottom: 36px;
            position: relative;
            overflow: visible;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--cyan), var(--gold));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '🐾';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            filter: drop-shadow(0 0 6px var(--cyan));
        }

        /* ── Question ── */
        .question-divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 20px;
        }

        .question-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            font-weight: 400;
            line-height: 1.7;
            color: var(--text);
            text-align: center;
            margin-bottom: 36px;
        }

        /* ── Options ── */
        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 22px;
            color: rgba(200, 220, 255, 0.75);
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.06), rgba(201, 168, 76, 0.04));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .option-btn:hover::before {
            opacity: 1;
        }

        .option-btn:hover {
            border-color: rgba(0, 212, 255, 0.4);
            color: var(--text);
            transform: translateX(4px);
            box-shadow: 0 0 24px rgba(0, 212, 255, 0.08), inset 0 0 0 1px rgba(0, 212, 255, 0.1);
        }

        .option-btn:active {
            transform: translateX(4px) scale(0.99);
        }

        .option-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-family: 'Space Mono', monospace;
            color: var(--cyan);
            flex-shrink: 0;
            transition: all 0.25s;
        }

        .option-btn:hover .option-icon {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.4);
        }

        /* ── Result Screen ── */
        .result-crown {
            font-size: 2.5rem;
            margin-bottom: 8px;
            display: block;
            animation: crownFloat 3s ease-in-out infinite;
        }

        @keyframes crownFloat {

            0%,
            100% {
                transform: translateY(0) rotate(-3deg);
            }

            50% {
                transform: translateY(-8px) rotate(3deg);
            }
        }

        .result-type-badge {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, var(--cyan), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .result-headline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .result-image {
            width: 100%;
            max-width: 200px;
            border-radius: 16px;
            margin: 0 auto 16px;
            display: block;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(201, 168, 76, 0.2);
        }

        .result-description {
            background: rgba(0, 212, 255, 0.04);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            line-height: 1.6;
            font-size: 0.9rem;
            color: rgba(200, 220, 255, 0.85);
            text-align: left;
            margin-bottom: 20px;
        }

        .share-btn {
            width: 100%;
            padding: 18px 32px;
            border: none;
            border-radius: 16px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            background: linear-gradient(135deg, #0a7abf, #1a5fa8);
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        .share-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            transition: left 0.5s ease;
        }

        .share-btn:hover::before {
            left: 100%;
        }

        .share-btn:hover {
            background: linear-gradient(135deg, #0e8fd4, #2070c0);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.25);
            transform: translateY(-1px);
        }

        .share-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .retry-btn {
            width: 100%;
            padding: 18px 32px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            color: var(--text);
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.15);
        }

        /* ── Footer ── */
        .cat-footer {
            text-align: center;
            margin-top: 24px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.15);
        }

        /* ── Fade-in Animation ── */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Decorative corner ── */
        .corner-deco {
            position: absolute;
            width: 60px;
            height: 60px;
            opacity: 0.2;
        }

        .corner-deco.tl {
            top: 16px;
            left: 16px;
            border-top: 1px solid var(--gold);
            border-left: 1px solid var(--gold);
            border-radius: 4px 0 0 0;
        }

        .corner-deco.br {
            bottom: 16px;
            right: 16px;
            border-bottom: 1px solid var(--gold);
            border-right: 1px solid var(--gold);
            border-radius: 0 0 4px 0;
        }
    </style>
</head>

<body>
    <!-- Background -->
    <canvas class="stars-canvas" id="starsCanvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="app">
        <div class="brand">
            <span class="brand-name">PurrPaw</span>
            <span class="brand-paw">🐾</span>
            <span class="brand-name">MBTI Oracle</span>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="glass-card">
            <div class="corner-deco tl"></div>
            <div class="corner-deco br"></div>
            <div class="loading-content">
                <div class="loading-glyph">✦</div>
                <div class="loading-title">กำลังเตรียมพิธีกรรม...</div>
                <div class="loading-sub">ดวงดาวกำลังเรียงตัวเพื่อคุณเมี๊ยว</div>
                <div class="loading-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="glass-card hidden">
            <div class="corner-deco tl"></div>
            <div class="corner-deco br"></div>
            <div class="quiz-header">
                <span class="question-counter" id="question-counter">01 / 12</span>
                <span class="quiz-badge">MBTI TEST</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="question-divider"></div>
            <p class="question-text" id="question-text"></p>
            <div class="options-grid" id="options-grid"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="glass-card hidden">
            <div class="corner-deco tl"></div>
            <div class="corner-deco br"></div>
            <div style="text-align:center;">
                <span class="result-crown">✦</span>
                <div class="result-type-badge" id="result-title">XXXX</div>
                <div class="result-headline" id="result-cat-type"></div>
            </div>
            <img id="result-image" class="result-image" src="" alt="Result" style="display:none;">
            <div class="result-description" id="result-description"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px;">
                <button id="retry-btn" class="retry-btn">🔄 ทำใหม่อีกครั้ง</button>
                <button id="share-btn" class="share-btn" style="margin-top:0;">✨ แชร์ผลลัพธ์</button>
            </div>
        </div>

        <div class="cat-footer">PURRPAW AI — FIND YOUR INNER CAT 🐾</div>
    </div>

    <script>
        /* ── Stars Canvas ── */
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < 160; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.2 + 0.2,
                    alpha: Math.random(),
                    speed: Math.random() * 0.008 + 0.002,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function drawStars(t) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                const a = 0.3 + 0.5 * Math.sin(s.phase + t * s.speed);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 220, 255, ${a})`;
                ctx.fill();
            });
            requestAnimationFrame(drawStars);
        }

        resizeCanvas();
        createStars();
        requestAnimationFrame(drawStars);
        window.addEventListener('resize', () => { resizeCanvas(); createStars(); });

        /* ── APP LOGIC (unchanged) ── */
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sessionId');

        let questions = [];
        let currentIdx = 0;
        let scores = { E: 0, S: 0, T: 0, J: 0 };
        let sessionData = null;
        let visitorId = null;

        // ── Fingerprint Init (UMD Version) ──
        const fpPromise = FingerprintJS.load();

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let model = "Unknown Device";
            if (/android/i.test(ua)) {
                const match = ua.match(/Android\s+([^\s;]+);?\s+([^;)]+)/);
                model = match ? match[2] : "Android Device";
            } else if (/iPhone|iPad|iPod/i.test(ua)) {
                model = "Apple Device (iPhone/iPad)";
            } else if (/Windows/i.test(ua)) {
                model = "Windows PC";
            } else if (/Macintosh/i.test(ua)) {
                model = "MacBook/Mac";
            }
            return { model, ua };
        }

        async function init() {
            if (!sessionId) {
                document.getElementById('loading-screen').querySelector('.loading-content').innerHTML =
                    '<div class="loading-glyph" style="color:#ef4444">✕</div><div class="loading-title">ไม่พบรหัสเซสชัน</div><div class="loading-sub">กรุณากดเริ่มทำจากใน Discord นะเมี๊ยว 🐾</div>';
                return;
            }
            try {
                const res = await fetch(`/api/session/${sessionId}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                sessionData = data.session;
                questions = data.questions;
                showQuiz();
            } catch (err) {
                document.getElementById('loading-screen').querySelector('.loading-content').innerHTML =
                    `<div class="loading-glyph" style="color:#ef4444">✕</div><div class="loading-title">เกิดข้อผิดพลาดเมี๊ยว 🐾</div><div class="loading-sub">${err.message}</div>`;
            }
        }

        function showQuiz() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const qText = document.getElementById('question-text');
            qText.classList.remove('fade-in');
            void qText.offsetWidth;
            qText.innerText = q.text;
            qText.classList.add('fade-in');

            const total = questions.length;
            const num = String(currentIdx + 1).padStart(2, '0');
            const totalStr = String(total).padStart(2, '0');
            document.getElementById('question-counter').innerText = `${num} / ${totalStr}`;
            document.getElementById('progress-bar').style.width = `${(currentIdx / total) * 100}%`;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            const icons = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.style.animationDelay = `${i * 0.07}s`;
                btn.innerHTML = `<span class="option-icon">${icons[i] || String.fromCharCode(65 + i)}</span><span>${opt.label}</span>`;
                btn.onclick = () => handleAnswer(opt, q.dim);
                grid.appendChild(btn);
                btn.classList.add('fade-in');
            });
        }

        function handleAnswer(opt, dim) {
            scores[dim] += opt.val;
            currentIdx++;
            if (currentIdx < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        async function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('loading-screen').querySelector('.loading-content').innerHTML =
                '<div class="loading-glyph">✦</div><div class="loading-title">กำลังอ่านดวงชะตา...</div><div class="loading-sub">ดาวกำลังวิเคราะห์บุคลิกของคุณ</div><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

            const finalResult = [
                scores.E >= 0 ? 'E' : 'I',
                scores.S >= 0 ? 'S' : 'N',
                scores.T >= 0 ? 'T' : 'F',
                scores.J >= 0 ? 'J' : 'P'
            ].join('');

            try {
                // Get fingerprint before submitting
                const fp = await fpPromise;
                const fpResult = await fp.get();
                visitorId = fpResult.visitorId;
                const deviceInfo = getDeviceInfo();

                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId, 
                        scores, 
                        result: finalResult,
                        fingerprint: visitorId,
                        userAgent: deviceInfo.ua,
                        deviceModel: deviceInfo.model
                    })
                });
                const data = await res.json();

                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                document.getElementById('result-title').innerText = finalResult;
                document.getElementById('result-description').innerText =
                    `🐱 คุณคือ: ${data.cat_type}\n\nบันทึกผลการทดสอบเรียบร้อยแล้วเมี๊ยว! กดแชร์เพื่อประกาศให้เพื่อนๆ ใน Discord รู้ได้เลยนะ🐾`;

                if (data.image_url) {
                    const img = document.getElementById('result-image');
                    img.src = data.image_url;
                    img.style.display = 'block';
                }

                document.getElementById('share-btn').onclick = async () => {
                    const btn = document.getElementById('share-btn');
                    const originalText = btn.innerText;
                    btn.innerText = 'กำลังแชร์ไปที่ Discord... 🐾';
                    btn.disabled = true;
                    try {
                        const shareRes = await fetch('/api/share', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sessionId, result: finalResult })
                        });
                        if (shareRes.ok) {
                            btn.innerText = '✅ แชร์สำเร็จแล้วเมี๊ยว!';
                            btn.style.background = 'linear-gradient(135deg, #15803d, #16a34a)';
                        } else { throw new Error(); }
                    } catch {
                        btn.innerText = '❌ แชร์ไม่สำเร็จเมี๊ยว...';
                        btn.disabled = false;
                        setTimeout(() => { btn.innerText = originalText; }, 3000);
                    }
                };

                document.getElementById('retry-btn').onclick = () => {
                    currentIdx = 0;
                    scores = { E: 0, S: 0, T: 0, J: 0 };
                    document.getElementById('result-screen').classList.add('hidden');
                    showQuiz();
                };
            } catch (err) {
                console.error(err);
                alert('งื้อออ เกิดข้อผิดพลาดในการส่งข้อมูลเมี๊ยว🐾');
            }
        }

        init();
    </script>
</body>

</html>
